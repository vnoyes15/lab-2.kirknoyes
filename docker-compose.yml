# Section 86 S4: "docker-compose up -d starts Redis locally. Supabase runs as a hosted
# service — no local Supabase instance needed."
#
# The `api` service is included so the whole local stack can run in containers too
# (Section 05: Docker gives "consistent local and production environments") — but day
# to day, S8's `uvicorn arx.api.main:app --reload` against this compose file's Redis is
# the faster inner loop. Both point at the same hosted Supabase DATABASE_URL via .env.
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

volumes:
  redis-data:
